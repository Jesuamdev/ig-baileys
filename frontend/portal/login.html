<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IG Accounting — Portal de Clientes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F8FAFC;--surface:#FFFFFF;--border:#E2E8F0;--accent:#2563EB;--text:#0F172A;--muted:#64748B;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.logo-icon{width:42px;height:42px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:20px;color:white}
.logo-name{font-size:22px;font-weight:600}
.logo-sub{font-size:12px;color:var(--muted);margin-top:2px}
h2{font-size:20px;font-weight:600;margin-bottom:6px}
.subtitle{font-size:14px;color:var(--muted);margin-bottom:32px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.field{margin-bottom:20px}
input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:.2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{width:100%;padding:13px;background:var(--accent);color:white;border:none;border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:.2s;margin-top:4px}
.btn:hover{background:#1D4ED8}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{background:#FEF2F2;border:1px solid #FECACA;color:#DC2626;padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:20px;display:none}
.agent-link{text-align:center;margin-top:24px;font-size:13px;color:var(--muted)}
.agent-link a{color:var(--accent);text-decoration:none;font-weight:500}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">C</div>
    <div>
      <div class="logo-name">IG Accounting</div>
      <div class="logo-sub">Portal de Clientes</div>
    </div>
  </div>
  <h2>Accede a tu portal</h2>
  <p class="subtitle">Revisa tus servicios, documentos y pagos</p>
  <div class="error" id="error"></div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="btn" onclick="login()">Entrar a mi portal</button>
  <div class="agent-link">
    ¿Eres agente? <a href="../panel/login.html">Panel de gestión →</a>
  </div>
</div>
<script>
const API = localStorage.getItem('ce_api') || 'https://ig-baileys-production.up.railway.app';
document.getElementById('password').addEventListener('keydown', e => e.key==='Enter' && login());
async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const btn   = document.getElementById('btn');
  const err   = document.getElementById('error');
  err.style.display='none';
  if (!email||!pass) { showErr('Completa todos los campos'); return; }
  btn.disabled=true; btn.textContent='Verificando...';
  try {
    const r = await fetch(`${API}/api/auth/cliente/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password:pass})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.message||'Error al iniciar sesión');
    localStorage.setItem('ce_client_token', d.token);
    localStorage.setItem('ce_client_user', JSON.stringify(d.usuario));
    window.location.href = 'index.html';
  } catch(e) { showErr(e.message); btn.disabled=false; btn.textContent='Entrar a mi portal'; }
}
function showErr(m) { const e=document.getElementById('error'); e.textContent=m; e.style.display='block'; }
</script>
</body>
</html>
